<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유튜브 트렌드 레이더</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f2f2ee;
  --surface: #ffffff;
  --surface2: #f7f7f3;
  --border: #e0e0da;
  --accent: #e03030;
  --gold: #c8900a;
  --teal: #0a8a70;
  --blue: #1a60c0;
  --text: #1a1a18;
  --sub: #555550;
  --muted: #999990;
  --dim: #c0c0b8;
  --shorts-color: #ff0050;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }

header {
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 700; }
.logo-text { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; }
.logo-sub { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; }
.last-updated { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

.main { max-width: 1440px; margin: 0 auto; padding: 20px 28px; }

.search-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px 22px; margin-bottom: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.panel-label { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }
.search-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.search-input {
  flex: 1; min-width: 200px; padding: 10px 14px;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 8px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 14px;
  outline: none; transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--dim); }
.sel { padding: 10px 12px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; cursor: pointer; outline: none; }

.date-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; align-items: center; }
.date-label { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; margin-right: 2px; }
.date-btn {
  padding: 6px 14px; border-radius: 100px; border: 1.5px solid var(--border);
  background: var(--surface2); color: var(--sub); font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.date-btn:hover { border-color: var(--accent); color: var(--accent); }
.date-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }

.chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.chip {
  padding: 5px 12px; border-radius: 100px; border: 1.5px solid var(--border);
  background: var(--surface2); color: var(--sub); font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.chip:hover { border-color: var(--accent); color: var(--accent); background: #fff5f5; }

.controls-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 12px 18px; margin-bottom: 12px;
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.ctrl-label { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; letter-spacing: 0.08em; text-transform: uppercase; margin-right: 2px; white-space: nowrap; }
.sort-btn {
  padding: 7px 13px; border-radius: 7px; border: 1.5px solid var(--border);
  background: var(--surface2); color: var(--sub); font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.sort-btn:hover { border-color: var(--accent); color: var(--accent); }
.sort-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
.divider { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }
.type-btn {
  padding: 7px 13px; border-radius: 7px; border: 1.5px solid var(--border);
  background: var(--surface2); color: var(--sub); font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.type-btn.active-all    { background: var(--text); border-color: var(--text); color: #fff; }
.type-btn.active-shorts { background: var(--shorts-color); border-color: var(--shorts-color); color: #fff; }
.type-btn.active-long   { background: var(--blue); border-color: var(--blue); color: #fff; }

.fetch-btn {
  margin-left: auto; padding: 10px 22px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 7px; white-space: nowrap;
}
.fetch-btn:hover { background: #c52828; }
.fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.progress-wrap { margin-bottom: 12px; display: none; }
.progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }
.progress-text { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 6px; }

.summary-bar {
  display: flex; flex-wrap: wrap; margin-bottom: 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.sum-item { flex: 1; min-width: 110px; padding: 12px 18px; border-right: 1px solid var(--border); }
.sum-item:last-child { border-right: none; }
.sum-label { font-size: 9px; color: var(--muted); font-family: 'Space Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
.sum-value { font-size: 17px; font-weight: 700; font-family: 'Space Mono', monospace; }
.sum-value.red  { color: var(--accent); }
.sum-value.teal { color: var(--teal); }
.sum-value.gold { color: var(--gold); }
.sum-value.blue { color: var(--blue); }

.error-box {
  background: #fff5f5; border: 1.5px solid #ffcccc; border-radius: 10px;
  padding: 14px 18px; display: flex; gap: 10px; font-size: 13px; color: #c03030;
  margin-bottom: 12px; line-height: 1.6;
}

.results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 12px; }

.video-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 12px; overflow: hidden; text-decoration: none; display: block;
  transition: all 0.2s; animation: fadeUp 0.3s ease both;
}
.video-card:hover { border-color: #bbbbb0; transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.09); }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

.thumb-wrap { position: relative; aspect-ratio: 16/9; overflow: hidden; background: var(--surface2); }
.thumb-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; display: block; }
.video-card:hover .thumb-wrap img { transform: scale(1.04); }

.badge { position: absolute; font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 4px; }
.rank-badge    { top: 7px; left: 7px; background: rgba(0,0,0,0.72); color: #fff; }
.shorts-badge  { top: 7px; right: 7px; background: var(--shorts-color); color: #fff; }
.long-badge    { top: 7px; right: 7px; background: var(--blue); color: #fff; }
.gem-badge     { top: 7px; right: 7px; background: var(--gold); color: #fff; }
.new-badge     { bottom: 7px; left: 7px; background: #16a34a; color: #fff; font-size: 9px; }
.duration-badge{ bottom: 7px; right: 7px; background: rgba(0,0,0,0.72); color: #fff; }

.card-body { padding: 12px 14px 14px; }
.card-title {
  font-size: 13px; font-weight: 500; line-height: 1.5; color: var(--text); margin-bottom: 10px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
.stat-box { background: var(--surface2); border-radius: 6px; padding: 6px 9px; border: 1px solid var(--border); }
.stat-lbl { font-size: 9px; color: var(--muted); font-family: 'Space Mono', monospace; text-transform: uppercase; margin-bottom: 2px; }
.stat-val { font-size: 13px; font-weight: 700; font-family: 'Space Mono', monospace; }
.stat-val.red  { color: var(--accent); }
.stat-val.teal { color: var(--teal); }
.stat-val.gold { color: var(--gold); }
.stat-val.dim  { color: var(--sub); font-size: 11px; font-weight: 400; }

.gem-row { display: flex; align-items: center; gap: 7px; margin-bottom: 9px; }
.gem-lbl { font-size: 10px; color: var(--gold); font-family: 'Space Mono', monospace; white-space: nowrap; }
.gem-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.gem-fill { height: 100%; background: var(--gold); border-radius: 2px; }
.gem-pct { font-size: 10px; color: var(--gold); font-family: 'Space Mono', monospace; min-width: 30px; text-align: right; }

.card-footer { display: flex; justify-content: space-between; align-items: flex-end; padding-top: 9px; border-top: 1px solid var(--border); gap: 6px; }
.channel-info { overflow: hidden; }
.channel-name { font-size: 12px; color: var(--sub); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 1px; }
.channel-age  { font-size: 10px; color: var(--muted); }
.date-info { text-align: right; flex-shrink: 0; }
.upload-ago  { font-size: 12px; color: var(--text); font-weight: 500; white-space: nowrap; }
.upload-date { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; }

.state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; text-align: center; gap: 12px; }
.state-icon  { font-size: 44px; }
.state-title { font-size: 15px; font-weight: 500; color: var(--text); }
.state-desc  { font-size: 13px; color: var(--muted); line-height: 1.7; max-width: 340px; }
.spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">▶</div>
    <div>
      <div class="logo-text">TREND RADAR</div>
      <div class="logo-sub">YouTube 실시간 트렌드</div>
    </div>
  </div>
  <div class="last-updated" id="lastUpdated">업데이트: —</div>
</header>

<div class="main">

  <div class="search-panel">
    <div class="panel-label">키워드 + 기간 검색</div>
    <div class="search-row">
      <input class="search-input" id="searchInput" type="text" placeholder="한국사 / 타로 / 사주 / 경제 / 심리학 / 건강 ..." />
      <select class="sel" id="regionSelect">
        <option value="KR">🇰🇷 한국</option>
        <option value="JP">🇯🇵 일본</option>
        <option value="US">🇺🇸 미국</option>
        <option value="TW">🇹🇼 대만</option>
      </select>
    </div>

    <div class="date-filter">
      <span class="date-label">기간:</span>
      <button class="date-btn" id="date-1"  onclick="setDate(1)">오늘</button>
      <button class="date-btn" id="date-3"  onclick="setDate(3)">3일</button>
      <button class="date-btn active" id="date-7"  onclick="setDate(7)">7일</button>
      <button class="date-btn" id="date-14" onclick="setDate(14)">2주</button>
      <button class="date-btn" id="date-30" onclick="setDate(30)">30일</button>
      <button class="date-btn" id="date-0"  onclick="setDate(0)">전체기간</button>
    </div>

    <div class="chips">
      <button class="chip" onclick="setChip('한국사')">한국사</button>
      <button class="chip" onclick="setChip('경제')">경제</button>
      <button class="chip" onclick="setChip('심리학')">심리학</button>
      <button class="chip" onclick="setChip('건강 정보')">건강정보</button>
      <button class="chip" onclick="setChip('IT 기술')">IT/기술</button>
      <button class="chip" onclick="setChip('쇼핑 추천')">쇼핑</button>
      <button class="chip" onclick="setChip('타로')">타로</button>
      <button class="chip" onclick="setChip('사주 운세')">사주</button>
      <button class="chip" onclick="setChip('부동산')">부동산</button>
      <button class="chip" onclick="setChip('주식 투자')">주식</button>
      <button class="chip" onclick="setChip('다이어트')">다이어트</button>
      <button class="chip" onclick="setChip('육아')">육아</button>
      <button class="chip" onclick="setChip('요리 레시피')">요리</button>
      <button class="chip" onclick="setChip('여행 vlog')">여행</button>
      <button class="chip" onclick="setChip('영어 공부')">영어</button>
      <button class="chip" onclick="setChip('인공지능 AI')">AI</button>
      <button class="chip" onclick="setChip('게임')">게임</button>
      <button class="chip" onclick="setChip('먹방')">먹방</button>
      <button class="chip" onclick="setChip('뷰티 메이크업')">뷰티</button>
      <button class="chip" onclick="setChip('운동 헬스')">운동</button>
    </div>
  </div>

  <div class="controls-panel">
    <span class="ctrl-label">정렬</span>
    <button class="sort-btn active" id="sort-recent"  onclick="setSort('recent')">🕐 최신순</button>
    <button class="sort-btn"        id="sort-views"   onclick="setSort('views')">📊 조회수순</button>
    <button class="sort-btn"        id="sort-gem"     onclick="setSort('gem')">💎 숨은보석</button>
    <button class="sort-btn"        id="sort-channel" onclick="setSort('channel')">📡 소채널순</button>
    <div class="divider"></div>
    <span class="ctrl-label">형식</span>
    <button class="type-btn active-all" id="type-all"    onclick="setType('all')">전체</button>
    <button class="type-btn"            id="type-shorts" onclick="setType('shorts')">쇼츠</button>
    <button class="type-btn"            id="type-long"   onclick="setType('long')">롱폼</button>
    <button class="fetch-btn" id="fetchBtn" onclick="fetchVideos()">
      <span id="btnIcon">▶</span>
      <span id="btnText">검색 실행</span>
    </button>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">준비 중...</div>
  </div>

  <div id="errorBox" class="error-box" style="display:none">
    <span>⚠</span><span id="errorMsg"></span>
  </div>

  <div id="summaryBar" class="summary-bar" style="display:none">
    <div class="sum-item"><div class="sum-label">수집된 영상</div><div class="sum-value red"  id="sumCount">—</div></div>
    <div class="sum-item"><div class="sum-label">쇼츠</div><div class="sum-value" style="color:var(--shorts-color)" id="sumShorts">—</div></div>
    <div class="sum-item"><div class="sum-label">롱폼</div><div class="sum-value blue" id="sumLong">—</div></div>
    <div class="sum-item"><div class="sum-label">총 조회수</div><div class="sum-value" id="sumViews">—</div></div>
    <div class="sum-item"><div class="sum-label">평균 구독자</div><div class="sum-value teal" id="sumSubs">—</div></div>
    <div class="sum-item"><div class="sum-label">기간</div><div class="sum-value gold" id="sumPeriod">—</div></div>
  </div>

  <div id="content">
    <div class="state-box">
      <div class="state-icon">📡</div>
      <div class="state-title">기간을 선택하고 키워드를 입력하세요</div>
      <div class="state-desc">
        오늘 / 3일 / 7일 등 기간을 먼저 선택하면<br>
        <strong>해당 기간 내 업로드된 영상만</strong> 수집해요.<br>
        페이지네이션으로 최대 100개까지 가져와요.
      </div>
    </div>
  </div>

</div>

<script>
const API_KEY = 'AIzaSyCzOaKaISR0l-kWH8a8Tzp6dpguB04XJLg';
let currentSort = 'recent';
let currentType = 'all';
let currentDays = 7;
let allVideos   = [];

function setDate(days) {
  currentDays = days;
  document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('date-' + days).classList.add('active');
}

function setChip(kw) {
  document.getElementById('searchInput').value = kw;
}

function setSort(s) {
  currentSort = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + s).classList.add('active');
  if (allVideos.length) renderCards(applyFilters(allVideos));
}

function setType(t) {
  currentType = t;
  ['all','shorts','long'].forEach(x => {
    const b = document.getElementById('type-' + x);
    b.className = 'type-btn' + (x === t ? ' active-' + x : '');
  });
  if (allVideos.length) renderCards(applyFilters(allVideos));
}

function isShorts(video) {
  const dur = video.contentDetails?.duration || '';
  const m = dur.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return false;
  return (parseInt(m[1]||0)*3600) + (parseInt(m[2]||0)*60) + parseInt(m[3]||0) <= 60;
}

function gemScore(v) {
  return parseInt(v.statistics?.viewCount||0) / Math.max(parseInt(v.channelInfo?.subscriberCount||1), 1);
}

function applyFilters(videos) {
  let v = [...videos];
  if (currentType === 'shorts') v = v.filter(x => isShorts(x));
  if (currentType === 'long')   v = v.filter(x => !isShorts(x));
  if (currentSort === 'recent')  v.sort((a,b) => new Date(b.snippet?.publishedAt) - new Date(a.snippet?.publishedAt));
  if (currentSort === 'views')   v.sort((a,b) => parseInt(b.statistics?.viewCount||0) - parseInt(a.statistics?.viewCount||0));
  if (currentSort === 'gem')     v.sort((a,b) => gemScore(b) - gemScore(a));
  if (currentSort === 'channel') v.sort((a,b) => parseInt(a.channelInfo?.subscriberCount||0) - parseInt(b.channelInfo?.subscriberCount||0));
  return v;
}

function fmtNum(n) {
  n = parseInt(n) || 0;
  if (n >= 100000000) return (n/100000000).toFixed(1) + '억';
  if (n >= 10000)     return Math.floor(n/10000) + '만';
  if (n >= 1000)      return (n/1000).toFixed(1) + 'k';
  return n.toLocaleString();
}

function fmtAgo(iso) {
  if (!iso) return '—';
  const d = Math.floor((Date.now() - new Date(iso)) / 86400000);
  if (d === 0) return '오늘';
  if (d === 1) return '어제';
  if (d < 7)   return d + '일 전';
  if (d < 30)  return Math.floor(d/7) + '주 전';
  if (d < 365) return Math.floor(d/30) + '개월 전';
  return Math.floor(d/365) + '년 전';
}

function fmtDateStr(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
}

function fmtChannelAge(iso) {
  if (!iso) return '—';
  const years = (Date.now() - new Date(iso)) / (365.25 * 86400000);
  if (years < 1) return '개설 ' + Math.floor(years*12) + '개월';
  return '개설 ' + years.toFixed(1) + '년';
}

function parseDuration(dur) {
  if (!dur) return '';
  const m = dur.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '';
  const h = parseInt(m[1]||0), min = parseInt(m[2]||0), s = parseInt(m[3]||0);
  if (h > 0) return h + ':' + String(min).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  return min + ':' + String(s).padStart(2,'0');
}

function setProgress(pct, text) {
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = text;
}

async function fetchVideos() {
  const keyword = document.getElementById('searchInput').value.trim();
  const region  = document.getElementById('regionSelect').value;
  const btn     = document.getElementById('fetchBtn');

  if (!keyword) { alert('키워드를 입력해주세요!'); return; }

  btn.disabled = true;
  document.getElementById('btnIcon').textContent = '⟳';
  document.getElementById('btnText').textContent = '수집 중...';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('summaryBar').style.display = 'none';
  document.getElementById('content').innerHTML = '';
  setProgress(5, '검색 시작...');

  try {
    // publishedAfter 계산
    let publishedAfter = '';
    if (currentDays > 0) {
      const d = new Date();
      d.setDate(d.getDate() - currentDays);
      d.setHours(0, 0, 0, 0);
      publishedAfter = d.toISOString();
    }

    // 페이지네이션으로 최대 100개 수집 (50개 × 2페이지)
    const allIds  = [];
    let pageToken = '';
    const maxPages = 2;

    for (let page = 0; page < maxPages; page++) {
      setProgress(10 + page * 20, `영상 목록 수집 중... (${allIds.length}개)`);
      let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&q=${encodeURIComponent(keyword)}&regionCode=${region}&maxResults=50&order=date&key=${API_KEY}`;
      if (publishedAfter) url += `&publishedAfter=${encodeURIComponent(publishedAfter)}`;
      if (pageToken)      url += `&pageToken=${pageToken}`;

      const res  = await fetch(url);
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);

      (data.items || []).forEach(i => { if (i.id?.videoId) allIds.push(i.id.videoId); });
      pageToken = data.nextPageToken || '';
      if (!pageToken) break;
    }

    if (!allIds.length) {
      throw new Error(currentDays > 0
        ? `최근 ${currentDays}일 이내 "${keyword}" 영상이 없어요. 기간을 늘려보세요.`
        : `"${keyword}" 검색 결과가 없어요.`);
    }

    setProgress(50, `영상 상세 정보 가져오는 중... (총 ${allIds.length}개)`);

    // 50개씩 나눠서 videos.list 호출
    let videoItems = [];
    const idChunks = [];
    for (let i = 0; i < allIds.length; i += 50) idChunks.push(allIds.slice(i, i+50));

    for (let ci = 0; ci < idChunks.length; ci++) {
      setProgress(55 + ci * 10, `상세 정보 처리 ${ci+1}/${idChunks.length}...`);
      const vRes  = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${idChunks[ci].join(',')}&key=${API_KEY}`);
      const vData = await vRes.json();
      if (vData.error) throw new Error(vData.error.message);
      videoItems.push(...(vData.items || []));
    }

    setProgress(78, '채널 정보 가져오는 중...');

    // 채널 정보 배치 조회
    const chanIds = [...new Set(videoItems.map(v => v.snippet?.channelId).filter(Boolean))];
    const chanChunks = [];
    for (let i = 0; i < chanIds.length; i += 50) chanChunks.push(chanIds.slice(i, i+50));

    const channelMap = {};
    for (const chunk of chanChunks) {
      const cRes  = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${chunk.join(',')}&key=${API_KEY}`);
      const cData = await cRes.json();
      (cData.items || []).forEach(c => {
        channelMap[c.id] = { ...c.statistics, publishedAt: c.snippet?.publishedAt };
      });
    }

    videoItems.forEach(v => { v.channelInfo = channelMap[v.snippet?.channelId] || {}; });
    allVideos = videoItems;

    setProgress(100, `완료! ${allVideos.length}개 수집`);
    setTimeout(() => { document.getElementById('progressWrap').style.display = 'none'; }, 1000);

    // 요약
    const shortsCount = allVideos.filter(v => isShorts(v)).length;
    const totalViews  = allVideos.reduce((s,v) => s + parseInt(v.statistics?.viewCount||0), 0);
    const avgSubs     = Math.floor(allVideos.reduce((s,v) => s + parseInt(v.channelInfo?.subscriberCount||0), 0) / allVideos.length);

    document.getElementById('sumCount').textContent  = allVideos.length;
    document.getElementById('sumShorts').textContent = shortsCount;
    document.getElementById('sumLong').textContent   = allVideos.length - shortsCount;
    document.getElementById('sumViews').textContent  = fmtNum(totalViews);
    document.getElementById('sumSubs').textContent   = fmtNum(avgSubs);
    document.getElementById('sumPeriod').textContent = currentDays === 0 ? '전체' : `최근 ${currentDays}일`;
    document.getElementById('summaryBar').style.display = 'flex';

    renderCards(applyFilters(allVideos));
    document.getElementById('lastUpdated').textContent = '업데이트: ' + new Date().toLocaleTimeString('ko-KR');

  } catch(err) {
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('errorMsg').textContent = '오류: ' + err.message;
    document.getElementById('errorBox').style.display = 'flex';
    document.getElementById('content').innerHTML = `<div class="state-box"><div class="state-icon">⚠</div><div class="state-title">불러오기 실패</div><div class="state-desc">${err.message}</div></div>`;
  } finally {
    btn.disabled = false;
    document.getElementById('btnIcon').textContent = '▶';
    document.getElementById('btnText').textContent = '검색 실행';
  }
}

function renderCards(videos) {
  if (!videos.length) {
    document.getElementById('content').innerHTML = `<div class="state-box"><div class="state-icon">🔍</div><div class="state-title">해당 조건의 영상이 없어요</div><div class="state-desc">기간을 늘리거나 형식 필터를 바꿔보세요</div></div>`;
    return;
  }

  const maxGem = Math.max(...videos.map(v => gemScore(v)), 1);
  const now    = Date.now();
  const grid   = document.createElement('div');
  grid.className = 'results-grid';

  videos.forEach((video, i) => {
    const s  = video.snippet || {};
    const st = video.statistics || {};
    const ch = video.channelInfo || {};
    const shorts   = isShorts(video);
    const duration = parseDuration(video.contentDetails?.duration);
    const gem      = gemScore(video);
    const gemPct   = Math.round((gem / maxGem) * 100);
    const isGemVid = gemPct >= 60 && parseInt(ch.subscriberCount||0) < 100000;
    const thumb    = s.thumbnails?.medium?.url || s.thumbnails?.default?.url || '';
    const daysAgo  = Math.floor((now - new Date(s.publishedAt)) / 86400000);
    const isNew    = daysAgo <= 2;

    let rightBadge = '';
    if (currentSort === 'gem' && isGemVid) rightBadge = '<div class="badge gem-badge">💎 보석</div>';
    else if (shorts) rightBadge = '<div class="badge shorts-badge">쇼츠</div>';
    else             rightBadge = '<div class="badge long-badge">롱폼</div>';

    const card = document.createElement('a');
    card.className = 'video-card';
    card.href      = 'https://www.youtube.com/watch?v=' + video.id;
    card.target    = '_blank';
    card.rel       = 'noopener noreferrer';
    card.style.animationDelay = (i * 0.025) + 's';

    card.innerHTML = `
      <div class="thumb-wrap">
        <img src="${thumb}" alt="" loading="lazy" onerror="this.style.display='none'">
        <div class="badge rank-badge">#${i+1}</div>
        ${rightBadge}
        ${isNew ? '<div class="badge new-badge">NEW</div>' : ''}
        ${duration ? `<div class="badge duration-badge">${duration}</div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-title">${s.title || '제목 없음'}</div>
        <div class="stats-grid">
          <div class="stat-box"><div class="stat-lbl">조회수</div><div class="stat-val red">${fmtNum(st.viewCount)}</div></div>
          <div class="stat-box"><div class="stat-lbl">구독자</div><div class="stat-val teal">${ch.subscriberCount ? fmtNum(ch.subscriberCount) : '비공개'}</div></div>
          <div class="stat-box"><div class="stat-lbl">좋아요</div><div class="stat-val gold">${fmtNum(st.likeCount)}</div></div>
          <div class="stat-box"><div class="stat-lbl">댓글</div><div class="stat-val dim">${fmtNum(st.commentCount)}</div></div>
        </div>
        ${currentSort === 'gem' ? `
        <div class="gem-row">
          <span class="gem-lbl">숨은보석</span>
          <div class="gem-bar"><div class="gem-fill" style="width:${gemPct}%"></div></div>
          <span class="gem-pct">${gemPct}%</span>
        </div>` : ''}
        <div class="card-footer">
          <div class="channel-info">
            <div class="channel-name">📺 ${s.channelTitle || ''}</div>
            <div class="channel-age">${fmtChannelAge(ch.publishedAt)}</div>
          </div>
          <div class="date-info">
            <div class="upload-ago">${fmtAgo(s.publishedAt)}</div>
            <div class="upload-date">${fmtDateStr(s.publishedAt)}</div>
          </div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });

  document.getElementById('content').innerHTML = '';
  document.getElementById('content').appendChild(grid);
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchVideos();
});
</script>
